<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECTO LOGIN</title>
    <link rel="stylesheet" href="estilo/style.css">
    <link rel="stylesheet" href="estilos/mediaqueries.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
    <main>

        <section id="login">

            <div id="imagem">
               
            </div>


            <div id="formulario">

                <h1>LOGIN</h1>

                <p>Seja Bem-vindo(a),faça login para acessar a sua conta e fazer as configurações no seu Ambiente!</p>

                <form 
                
                    action="login.php" method="post" autocomplete="on">

                    <p>
                        <span class="material-symbols-outlined">person</span>
                        <input type="email" name="email" id="iemail" required autocomplete="email" placeholder="seu email @" maxlength="30" minlength="5">
                        <label for="iemail"></label>
                    </p>

                    <p>
                         <span class="material-symbols-outlined">key</span>
                        <input type="password" name="senha" id="isenha" required placeholder="sua senha" maxlength="20" minlength="8">
                        <label for="isenha"></label>
                    </p>

                    <p>
                        <input type="submit" value="Entrar" id="submit">
                    </p>

                    <p>
                        <a href="login.php"><input type="reset" value="Esqueceu a senha?" id="reset"></a> <span class="material-symbols-outlined">mark_email_unread</span>
                    </p>
                    


                </form>

            </div>
            
        </section>

    </main>
    
</body>
</html>
